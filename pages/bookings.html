    <meta charset="UTF-8">

<body>

    <!-- HEADER -->
    <header class="header">
        <h1>Your Bookings</h1>
        <p>Every journey you saved glows here</p>
    </header>

    <!-- BOOKING LIST SECTION -->
    <section id="booking-list" class="booking-container">
        <!-- JS will load bookings here -->
    </section>

    <!-- ACTION BUTTONS -->
    <div class="bottom-actions">
        <button id="clear-all" class="action-btn clear-btn">Clear All Bookings</button>
        <a href="../index.html" class="action-btn">Back to Home</a>
    </div>
    <div id="confirm-modal" class="confirm-modal">

    <div class="confirm-box">

        <h2>⚠️ Confirm Action</h2>

        <p id="confirm-message">
            Are you sure?
        </p>

        <div class="confirm-buttons">

            <button id="cancel-confirm">
                Cancel
            </button>

            <button id="ok-confirm">
                Delete
            </button>

        </div>

    </div>

</div>

    <script type="module" src="../js/bookings.js"></script>
