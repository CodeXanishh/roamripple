<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RoamRipple</title>

    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/toast.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <meta name="description" content="RoamRipple - AI Powered Travel Planner with Weather, Maps, Firebase Authentication and Smart Booking.">

<meta name="keywords" content="Travel Planner, Firebase, JavaScript, AI Travel, Weather API, Google Maps">

<meta name="author" content="Anish Kumar">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back 👋</h1>

        <p>Login to continue your journey.</p>

        <input
            type="email"
            id="email"
            placeholder="Email Address"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button id="login-btn">
            Login
        </button>

        <div class="divider">
            OR
        </div>

        <button id="google-login">
            Continue with Google
        </button>

        <p class="bottom-text">
            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </p>

    </div>

</div>
<div id="toast" class="toast"></div>

<script src="../js/toast.js"></script>

<script type="module" src="../js/firebase/firebase-config.js"></script>
<script type="module" src="../js/firebase/auth.js"></script>

</body>
</html>
